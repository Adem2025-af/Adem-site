<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOURABAH GYM - Progression</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { background-color: #050505; color: #f3f4f6; font-family: 'Poppins', sans-serif; scroll-behavior: smooth; }
        .gold-gradient { background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); }
        .card-gold { background: #111; border: 1px solid #262626; transition: 0.3s; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <nav class="sticky top-0 bg-black/90 backdrop-blur-md border-b border-gold-600/30 z-50 px-6 py-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold text-gold-500 font-serif tracking-tighter">BOURABAH GYM</h1>
            <div id="auth-controls">
                <button id="login-btn" onclick="openModal()" class="bg-gold-500 text-black px-4 py-1 rounded-lg font-bold text-sm hover:scale-105 transition">CONNEXION</button>
                <div id="user-display" class="hidden flex items-center gap-4">
                    <span id="user-email" class="text-xs text-gray-400 italic"></span>
                    <button onclick="handleLogout()" class="text-red-500 text-xs font-bold uppercase border border-red-500/30 px-2 py-1 rounded">Quitter</button>
                </div>
            </div>
        </div>
    </nav>

    <section id="tracker-section" class="hidden py-12 px-4 max-w-2xl mx-auto">
        <div class="card-gold p-8 rounded-3xl border-2 border-gold-500 shadow-xl">
            <h2 class="text-2xl font-bold text-gold-500 mb-6 text-center uppercase tracking-widest italic">Suivi de Progression</h2>
            
            <div class="flex gap-2 mb-8">
                <input type="number" id="weight-input" step="0.1" placeholder="Ton poids (kg)" class="flex-grow bg-dark-700 border border-white/10 p-3 rounded-xl text-white outline-none focus:border-gold-500">
                <button onclick="addWeight()" class="gold-gradient text-black px-6 py-3 rounded-xl font-bold hover:brightness-110">ENREGISTRER</button>
            </div>

            <div class="space-y-3" id="weight-history">
                </div>
        </div>
    </section>

    <div id="login-msg" class="py-32 text-center">
        <h2 class="text-3xl font-bold text-white mb-4">ESPACE MEMBRE</h2>
        <p class="text-gray-500 italic mb-8">Connecte-toi pour enregistrer ton poids et suivre tes résultats.</p>
        <button onclick="openModal()" class="gold-gradient text-black px-10 py-4 rounded-full font-bold uppercase tracking-widest shadow-lg">Se connecter</button>
    </div>

    <div id="auth-modal" class="hidden fixed inset-0 bg-black/95 flex items-center justify-center p-4 z-[100]">
        <div class="bg-dark-800 border border-gold-500/50 p-8 rounded-3xl w-full max-w-sm">
            <h3 class="text-2xl font-bold text-gold-500 mb-6 text-center italic">CONNEXION</h3>
            <div class="space-y-4">
                <input type="email" id="email" placeholder="Email" class="w-full bg-dark-700 border border-white/10 p-4 rounded-xl text-white outline-none focus:border-gold-500">
                <input type="password" id="password" placeholder="Mot de passe" class="w-full bg-dark-700 border border-white/10 p-4 rounded-xl text-white outline-none focus:border-gold-500">
                <button onclick="handleAuth('login')" class="w-full gold-gradient text-black font-bold py-4 rounded-xl uppercase tracking-widest">Entrer</button>
                <button onclick="handleAuth('register')" class="w-full text-gray-500 text-sm hover:text-gold-500 transition">Pas de compte ? Créer un compte</button>
                <button onclick="closeModal()" class="w-full text-red-500 text-xs mt-4 pt-4 border-t border-white/5 uppercase">Retour</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, where, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Tes clés récupérées sur la photo
        const firebaseConfig = {
          apiKey: "AIzaSyDC-IWYd4JECre8Jt8PpSKuc-AiJzgUmhE",
          authDomain: "adem-site.firebaseapp.com",
          projectId: "adem-site",
          storageBucket: "adem-site.firebasestorage.app",
          messagingSenderId: "1048126642969",
          appId: "1:1048126642969:web:00d7eff7d6aff58ee34388",
          measurementId: "G-E609LWND73"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth();
        const db = getFirestore();

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('login-btn').classList.add('hidden');
                document.getElementById('login-msg').classList.add('hidden');
                document.getElementById('user-display').classList.remove('hidden');
                document.getElementById('tracker-section').classList.remove('hidden');
                document.getElementById('user-email').innerText = user.email;
                loadWeights(user.uid);
            } else {
                document.getElementById('login-btn').classList.remove('hidden');
                document.getElementById('login-msg').classList.remove('hidden');
                document.getElementById('user-display').classList.add('hidden');
                document.getElementById('tracker-section').classList.add('hidden');
            }
        });

        window.handleAuth = async (type) => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            if(!email || !pass) return alert("Remplis les champs !");
            try {
                if(type === 'register') await createUserWithEmailAndPassword(auth, email, pass);
                else await signInWithEmailAndPassword(auth, email, pass);
                closeModal();
            } catch(e) { alert("Erreur : " + e.message); }
        };

        window.handleLogout = () => signOut(auth);

        window.addWeight = async () => {
            const val = document.getElementById('weight-input').value;
            if(!val) return;
            await addDoc(collection(db, "poids"), {
                userId: auth.currentUser.uid,
                valeur: val,
                createdAt: serverTimestamp(),
                dateStr: new Date().toLocaleDateString('fr-FR')
            });
            document.getElementById('weight-input').value = "";
        };

        function loadWeights(uid) {
            const q = query(collection(db, "poids"), where("userId", "==", uid), orderBy("createdAt", "desc"));
            onSnapshot(q, (snapshot) => {
                const list = document.getElementById('weight-history');
                list.innerHTML = "";
                snapshot.forEach(doc => {
                    const data = doc.data();
                    list.innerHTML += `
                        <div class="flex justify-between items-center bg-dark-700/50 p-4 rounded-xl border border-white/5">
                            <span class="text-gray-500 font-mono text-sm">${data.dateStr || 'Maintenant'}</span>
                            <span class="text-gold-500 font-bold text-lg">${data.valeur} kg</span>
                        </div>`;
                });
            });
        }

        window.openModal = () => document.getElementById('auth-modal').classList.remove('hidden');
        window.closeModal = () => document.getElementById('auth-modal').classList.add('hidden');
    </script>
</body>
</html>
